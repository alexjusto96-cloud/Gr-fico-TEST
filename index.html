<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Test Dinámica</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  
  <style>
    /* Ajuste total a la pantalla del móvil en App Inventor */
    html, body, #grafica_div {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>

  <script type="text/javascript">
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(cargarDatos);

    function cargarDatos() {
      const urlScript = "https://script.google.com/macros/s/AKfycbzqqfR5_X-wCwjQ3fNN__W1_L_nJlTjlhLefkAo_4feI9_VuA4sDsyHstGXbyRwtgUjZQ/exec?accion=graficaTest";

      fetch(urlScript)
        .then(response => {
          if (!response.ok) throw new Error("Error en la red");
          return response.json();
        })
        .then(datosJSON => {
          procesarYDibujar(datosJSON);
        })
        .catch(error => {
          console.error("Error al cargar:", error);
        });
    }

    function procesarYDibujar(datosJSON) {
      // Limpieza de fechas largas a formato corto (DD/MM/AAAA)
      for (let i = 1; i < datosJSON.length; i++) {
        let xValue = datosJSON[i][0];
        if (xValue && !isNaN(Date.parse(xValue))) {
          let fecha = new Date(xValue);
          let dia = String(fecha.getDate()).padStart(2, '0');
          let mes = String(fecha.getMonth() + 1).padStart(2, '0');
          let anio = fecha.getFullYear();
          datosJSON[i][0] = dia + "/" + mes + "/" + anio;
        }
      }

      // TRUCO DE CLARIDAD: Renombramos las columnas en la leyenda para indicar el eje
      if (datosJSON[0][1]) datosJSON[0][1] = datosJSON[0][1] + " (Eje Izq)";
      if (datosJSON[0][2]) datosJSON[0][2] = datosJSON[0][2] + " (Eje Dcho)";

      const data = google.visualization.arrayToDataTable(datosJSON);

      const options = {
        title: 'Evolución de Variables del Test',
        titleTextStyle: { fontSize: 15, bold: true, color: '#333' },
        curveType: 'function', 
        
        // Ajustamos la leyenda abajo con un tamaño de letra bien legible
        legend: { position: 'bottom', textStyle: { fontSize: 12, bold: true } },
        
        // Al quitar los títulos laterales, ganamos muchísimo espacio para la gráfica (de 64% a 82%)
        chartArea: { width: '82%', height: '70%', top: '10%', left: '9%', right: '9%' },
        
        // Configuración Eje X
        hAxis: {
          title: 'Registros / Fechas',
          titleTextStyle: { italic: false, bold: true, fontSize: 11, color: '#000000' },
          textStyle: { fontSize: 9 },
          slantedText: true,
          slantedTextAngle: 45
        },

        // Asignación de las series a cada eje vertical
        series: {
          0: { targetAxisIndex: 0, color: '#1a73e8' }, // Serie 1 (Azul) -> Izquierda
          1: { targetAxisIndex: 1, color: '#d93025' }  // Serie 2 (Rojo) -> Derecha
        },

        // Configuramos los dos ejes con sus colores correspondientes en los números
        vAxes: {
          0: {
            textStyle: { color: '#1a73e8', fontSize: 10, bold: true },
            gridlines: { color: '#f3f3f3' }
          },
          1: {
            textStyle: { color: '#d93025', fontSize: 10, bold: true },
            gridlines: { count: 0 }
          }
        },
        
        pointsVisible: true,
        pointSize: 5 // Puntos un pelín más grandes para poder tocarlos bien con el dedo
      };

      const chart = new google.visualization.LineChart(document.getElementById('grafica_div'));
      chart.draw(data, options);
    }

    window.addEventListener('resize', cargarDatos);
  </script>
</head>
<body>

  <div id="grafica_div"></div>

</body>
</html>
