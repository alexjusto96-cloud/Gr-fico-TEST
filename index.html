<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Test Dinámica</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  
  <style>
    /* Ajuste total a la pantalla del móvil en App Inventor */
    html, body, #grafica_div {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>

  <script type="text/javascript">
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(cargarDatos);

    function cargarDatos() {
      const urlScript = "https://script.google.com/macros/s/AKfycbzqqfR5_X-wCwjQ3fNN__W1_L_nJlTjlhLefkAo_4feI9_VuA4sDsyHstGXbyRwtgUjZQ/exec?accion=graficaTest";

      fetch(urlScript)
        .then(response => {
          if (!response.ok) throw new Error("Error en la red");
          return response.json();
        })
        .then(datosJSON => {
          procesarYDibujar(datosJSON);
        })
        .catch(error => {
          console.error("Error al cargar:", error);
        });
    }

    function procesarYDibujar(datosJSON) {
      // Limpieza de fechas largas a formato corto (DD/MM/AAAA)
      for (let i = 1; i < datosJSON.length; i++) {
        let xValue = datosJSON[i][0];
        if (xValue && !isNaN(Date.parse(xValue))) {
          let fecha = new Date(xValue);
          let dia = String(fecha.getDate()).padStart(2, '0');
          let mes = String(fecha.getMonth() + 1).padStart(2, '0');
          let anio = fecha.getFullYear();
          datosJSON[i][0] = dia + "/" + mes + "/" + anio;
        }
      }

      const data = google.visualization.arrayToDataTable(datosJSON);

      const options = {
        // TÍTULO ELIMINADO POR COMPLETO
        curveType: 'function', 
        legend: { position: 'bottom', textStyle: { fontSize: 11 } },
        
        // Maximizamos el espacio vertical al no haber título arriba (reducimos top a '4%')
        chartArea: { width: '78%', height: '75%', top: '4%', left: '11%', right: '11%' },
        
        // Configuración Eje X
        hAxis: {
          title: 'Registros / Fechas',
          titleTextStyle: { italic: false, bold: true, fontSize: 11, color: '#000000' },
          textStyle: { fontSize: 9 },
          slantedText: true,
          slantedTextAngle: 45
        },

        // Mantenemos la asignación a cada eje vertical
        series: {
          0: { targetAxisIndex: 0, color: '#1a73e8' }, // Variable 1 (Azul)
          1: { targetAxisIndex: 1, color: '#d93025' }  // Variable 2 (Rojo)
        },

        // LÍNEAS DE TENDENCIA: Una para cada serie usando sus colores correspondientes
        trendlines: {
          0: { 
            type: 'linear', 
            color: '#1a73e8', 
            opacity: 0.4, 
            lineWidth: 2,
            labelInLegend: 'Tendencia 1'
          },
          1: { 
            type: 'linear', 
            color: '#d93025', 
            opacity: 0.4, 
            lineWidth: 2,
            labelInLegend: 'Tendencia 2'
          }
        },

        // Configuración de escalas de números verticales sin etiquetas de título
        vAxes: {
          0: {
            textStyle: { color: '#1a73e8', fontSize: 9 },
            gridlines: { color: '#f3f3f3' }
          },
          1: {
            textStyle: { color: '#d93025', fontSize: 9 },
            gridlines: { count: 0 }
          }
        },
        
        pointsVisible: true,
        pointSize: 4
      };

      const chart = new google.visualization.LineChart(document.getElementById('grafica_div'));
      chart.draw(data, options);
    }

    window.addEventListener('resize', cargarDatos);
  </script>
</head>
<body>

  <div id="grafica_div"></div>

</body>
</html>
