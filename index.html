<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Test Dinámica</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  
  <style>
    /* Ajuste total a la pantalla del móvil en App Inventor */
    html, body, #grafica_div {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>

  <script type="text/javascript">
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(cargarDatos);

    function cargarDatos() {
      const urlScript = "https://script.google.com/macros/s/AKfycbzqqfR5_X-wCwjQ3fNN__W1_L_nJlTjlhLefkAo_4feI9_VuA4sDsyHstGXbyRwtgUjZQ/exec?accion=graficaTest";

      fetch(urlScript)
        .then(response => {
          if (!response.ok) throw new Error("Error en la red");
          return response.json();
        })
        .then(datosJSON => {
          procesarYDibujar(datosJSON);
        })
        .catch(error => {
          console.error("Error al cargar:", error);
        });
    }

    function procesarYDibujar(datosJSON) {
      // Limpieza de fechas largas a formato corto (DD/MM/AAAA)
      for (let i = 1; i < datosJSON.length; i++) {
        let xValue = datosJSON[i][0];
        if (xValue && !isNaN(Date.parse(xValue))) {
          let fecha = new Date(xValue);
          let dia = String(fecha.getDate()).padStart(2, '0');
          let mes = String(fecha.getMonth() + 1).padStart(2, '0');
          let anio = fecha.getFullYear();
          datosJSON[i][0] = dia + "/" + mes + "/" + anio;
        }
      }

      const data = google.visualization.arrayToDataTable(datosJSON);

      // Obtenemos dinámicamente los nombres de tus variables de la primera fila
      const nombreY1 = datosJSON[0][1] || "Variable 1";
      const nombreY2 = datosJSON[0][2] || "Variable 2";

      const options = {
        // TÍTULO CENTRADO Y MODIFICADO
        title: 'Evolución del rendimiento',
        alignment: 'center', // Alinea el contenido del título principal
        titleTextStyle: { fontSize: 16, bold: true, color: '#333' },
        curveType: 'function', 
        legend: { position: 'bottom', textStyle: { fontSize: 11 } },
        
        // MARGENES LATERALES: Ajustados al 16% para dar suficiente espacio exterior a los nombres de los ejes
        chartArea: { width: '68%', height: '70%', top: '12%', left: '16%', right: '16%' },
        
        // Configuración Eje X
        hAxis: {
          title: 'Registros / Fechas',
          titleTextStyle: { italic: false, bold: true, fontSize: 11, color: '#000000' },
          textStyle: { fontSize: 9 },
          slantedText: true,
          slantedTextAngle: 45
        },

        // Mantenemos los colores de las líneas/puntos para identificarlas
        series: {
          0: { targetAxisIndex: 0, color: '#1a73e8' }, // Serie 1 (Azul)
          1: { targetAxisIndex: 1, color: '#d93025' }  // Serie 2 (Rojo)
        },

        // COLOCO LOS TITULOS EN LOS EJES VERTICALES FORZANDO SU POSICIÓN EXTERIOR
        vAxes: {
          0: {
            title: nombreY1,
            titlePosition: 'out', // Fuerza a renderizar el nombre en el lado izquierdo
            titleTextStyle: { italic: false, bold: true, color: '#000000', fontSize: 11 },
            textStyle: { color: '#1a73e8', fontSize: 9 },
            gridlines: { color: '#f3f3f3' }
          },
          1: {
            title: nombreY2,
            titlePosition: 'out', // Fuerza a renderizar el nombre en el lado derecho
            titleTextStyle: { italic: false, bold: true, color: '#000000', fontSize: 11 },
            textStyle: { color: '#d93025', fontSize: 9 },
            gridlines: { count: 0 }
          }
        },
        
        pointsVisible: true,
        pointSize: 5
      };

      const chart = new google.visualization.LineChart(document.getElementById('grafica_div'));
      chart.draw(data, options);
    }

    window.addEventListener('resize', cargarDatos);
  </script>
</head>
<body>

  <div id="grafica_div"></div>

</body>
</html>
